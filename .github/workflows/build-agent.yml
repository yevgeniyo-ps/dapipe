name: Build Agent Binary

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build dapipe_hook.so
        run: |
          make -C src/hook clean all
          ls -la src/hook/dapipe_hook.so

      - name: Verify binary
        run: |
          nm -D src/hook/dapipe_hook.so | grep ' T connect'
          nm -D src/hook/dapipe_hook.so | grep ' T getaddrinfo'
          file src/hook/dapipe_hook.so

      - name: Compute SHA256
        id: hash
        run: |
          SHA=$(sha256sum src/hook/dapipe_hook.so | cut -d' ' -f1)
          SIZE=$(stat -c%s src/hook/dapipe_hook.so)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Get version and release notes
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          NOTES=$(gh release view "$GITHUB_REF_NAME" --json body -q .body 2>/dev/null || true)
          # Escape for JSON
          NOTES_ESCAPED=$(echo "$NOTES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))" 2>/dev/null || echo '""')
          echo "notes=$NOTES_ESCAPED" >> "$GITHUB_OUTPUT"

      - name: Upload to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"

          curl -f -X POST \
            "${SUPABASE_URL}/storage/v1/object/agent/${VERSION}/linux-${ARCH}/dapipe_hook.so" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary @src/hook/dapipe_hook.so

          echo "Uploaded to ${VERSION}/linux-${ARCH}/dapipe_hook.so"

      - name: Upsert agent_binaries record
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
          SHA: ${{ steps.hash.outputs.sha256 }}
          SIZE: ${{ steps.hash.outputs.size }}
          RELEASE_NOTES: ${{ steps.version.outputs.notes }}
        run: |
          python3 -c "
          import json, os
          body = json.dumps({
            'version': os.environ['VERSION'],
            'arch': os.environ['ARCH'],
            'file_size': int(os.environ['SIZE']),
            'sha256_hash': os.environ['SHA'],
            'storage_path': os.environ['VERSION'] + '/linux-' + os.environ['ARCH'] + '/dapipe_hook.so',
            'is_latest': False,
            'release_notes': os.environ.get('RELEASE_NOTES', '')
          })
          print(body)
          " > /tmp/body.json

          curl -f -X POST \
            "${SUPABASE_URL}/rest/v1/agent_binaries" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d @/tmp/body.json

          echo "Upserted agent_binaries record for ${VERSION}/${ARCH}"
